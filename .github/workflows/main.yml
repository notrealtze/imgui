name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        working-directory: examples/example_android_opengl3/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: imgui-debug
          path: examples/example_android_opengl3/android/app/build/outputs/apk/debug/app-debug.apk
